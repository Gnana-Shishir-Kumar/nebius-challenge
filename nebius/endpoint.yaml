# Nebius Serverless Endpoint N4 — hosted inference (HTTP JSON)
name: endoseg-endpoint
container_image: cr.eu-north1.nebius.cloud/e00jnhyx0bf601aj7q/endoseg-endpoint:latest

command:
  - python
  - serve.py

resources:
  gpu_count: 0          # onnxruntime CPU is enough for the compact U-Net
  memory_gb: 16

environment:
  DATA_DIR: /data
  OUT_DIR: /output
  MODEL_PATH: /data/model/unet.onnx
  IMG_SIZE: "256"
  MODEL_VERSION: unet-v1
  PORT: "8000"

object_storage_mounts:
  - bucket: endoseg-models
    mount_path: /data
    read_only: true

# Endpoint-specific settings (set in Nebius console or via CLI)
# health_check_path: /health
# autoscaling: min_replicas=0, max_replicas=2  (scale-to-zero for cost control)
# auth: bearer token required — expose only via proxy/proxy.py
