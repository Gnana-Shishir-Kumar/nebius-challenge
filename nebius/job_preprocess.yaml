# Nebius Serverless Job N1 — MMOTU preprocessing / ETL (CPU only)
name: endoseg-preprocess
container_image: cr.nebius.cloud/TODO_PROJECT_ID/endoseg-preprocess:latest  # TODO: set project ID and push image

command:
  - python
  - preprocess.py
  - --raw-dir=/data/raw/mmotu
  - --out-dir=/output/processed
  - --img-size=256
  - --clahe

resources:
  gpu_count: 0
  memory_gb: 16

environment:
  DATA_DIR: /data
  OUT_DIR: /output
  PYTHONUNBUFFERED: "1"

object_storage_mounts:
  - bucket: TODO_endoseg-data          # TODO: set bucket name
    mount_path: /data
    read_only: true
  - bucket: TODO_endoseg-processed     # TODO: set bucket name
    mount_path: /output
    read_only: false
