# Nebius Serverless Job N1 — MMOTU preprocessing / ETL (CPU only)
name: endoseg-preprocess
container_image: cr.eu-north1.nebius.cloud/e00jnhyx0bf601aj7q/endoseg-preprocess:latest  # REQUIRES: user's Nebius project ID -- fill before job submission

command:
  - python
  - preprocess.py
  - --raw-dir=/data/raw/mmotu
  - --out-dir=/output/processed
  - --img-size=256
  # note: --clahe was removed -- the current preprocess.py applies CLAHE
  # unconditionally and no longer accepts this flag (would error otherwise)

resources:
  gpu_count: 0
  memory_gb: 16

environment:
  DATA_DIR: /data
  OUT_DIR: /output
  PYTHONUNBUFFERED: "1"

object_storage_mounts:
  - bucket: endoseg-data          # REQUIRES: user's Nebius bucket name -- fill before job submission
    mount_path: /data
    read_only: true
  - bucket: endoseg-processed     # REQUIRES: user's Nebius bucket name -- fill before job submission
    mount_path: /output
    read_only: false
