# Nebius Serverless Job N3 — ONNX export + parity check (CPU only)
name: endoseg-export
container_image: cr.nebius.cloud/TODO_PROJECT_ID/endoseg-export:latest  # REQUIRES: user's Nebius project ID -- fill before job submission

command:
  - python
  - export_onnx.py
  - --checkpoint=/data/checkpoints/unet_best.pth
  - --out-dir=/output/model
  - --opset=17
  - --validate

resources:
  gpu_count: 0
  memory_gb: 16

environment:
  DATA_DIR: /data
  OUT_DIR: /output
  PYTHONUNBUFFERED: "1"

object_storage_mounts:
  - bucket: TODO_endoseg-checkpoints   # REQUIRES: user's Nebius bucket name -- fill before job submission (trained weights, read-only)
    mount_path: /data
    read_only: true
  - bucket: TODO_endoseg-models        # REQUIRES: user's Nebius bucket name -- fill before job submission (ONNX output)
    mount_path: /output
    read_only: false
